name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency: release

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Python Semantic Release
        id: release
        uses: python-semantic-release/python-semantic-release@v9
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          changelog: "true"
          # Don't commit or push to main — branch protection requires PRs.
          # The GitHub Release API creates the tag on the remote, and
          # hatch-vcs / git-describe derive versions from tags at build time,
          # so no files on main need updating.
          commit: "false"
          push: "false"
          tag: "true"
          vcs_release: "true"
