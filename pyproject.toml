[tool.semantic_release]
version_toml = []
version_variables = []
tag_format = "v{version}"
branch = "main"

[tool.semantic_release.changelog]
# Changelog content is included in the GitHub Release body only —
# no CHANGELOG.md file is committed (branch protection blocks direct pushes).
exclude_commit_patterns = []

[tool.semantic_release.commit_parser_options]
allowed_tags = ["feat", "fix", "perf", "refactor", "docs", "style", "test", "chore", "ci", "build"]
minor_tags = ["feat"]
patch_tags = ["fix", "perf"]
