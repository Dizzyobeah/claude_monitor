; Claude Monitor - ESP32 CYD Status Display for Claude Code
; Select your board variant by building the appropriate environment

[platformio]
default_envs = e32r28t

[common]
platform = espressif32
board = esp32dev
framework = arduino
lib_deps =
    lovyan03/LovyanGFX@^1.2.0
    bblanchon/ArduinoJson@^7.0.0
monitor_speed = 115200
upload_speed = 460800
board_build.f_cpu = 240000000L
board_build.flash_mode = dio
; Remove -Wl,-Map flag on Windows — long paths cause "Invalid argument" linker error
extra_scripts = remove_map_flag.py

[env:e32r28t]
extends = common
build_flags =
    -DBOARD_E32R28T
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_LOOP_STACK_SIZE=16384

[env:cyd_standard]
extends = common
build_flags =
    -DBOARD_CYD_2432S028R
    -DCORE_DEBUG_LEVEL=1

[env:cyd_v2]
extends = common
build_flags =
    -DBOARD_CYD_2432S028_V2
    -DCORE_DEBUG_LEVEL=1

[env:cyd_cap]
extends = common
build_flags =
    -DBOARD_CYD_2432S028C
    -DCORE_DEBUG_LEVEL=1

; Native test environment — runs on host, no ESP32 needed.
; Tests platform-independent logic (state parsing, session store).
[env:native]
platform = native
test_framework = unity
